<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Todo App</title>
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark'; // Bright Light! I am a mogwai. 
        document.documentElement.setAttribute('data-theme', savedTheme);
    </script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <nav class="nav-group">
                <a href="#" class="nav-link inbox-link">
                    <span>Inbox</span>
                    <span class="task-count" id="count-Inbox">0</span>
                </a>
            </nav>

            <nav class="nav-group time-filters">
                <a href="#" class="nav-link">
                    <span>Today</span>
                    <span class="task-count" id="count-Today">0</span>
                </a>
                <a href="#" class="nav-link">
                    <span>Upcoming</span>
                    <span class="task-count" id="count-Upcoming">0</span>
                </a>
                <a href="#" class="nav-link">
                    <span>Anytime</span>
                    <span class="task-count" id="count-Anytime">0</span>
                </a>
            </nav>

            <div class="projects-section">
                <h3>Projects</h3>
                <ul id="project-list"></ul>
                
                <div id="new-project-container">
                    <button id="show-add-project">+ New Project</button>
                    <div id="project-input-group">
                        <input type="text" id="new-project-name" placeholder="Project Name...">
                        <button id="confirm-add-project">Add</button>
                        <button id="cancel-add-project">Cancel</button>
                    </div>
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="clear-completed-btn" class="secondary-btn">Clear Completed</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="theme-toggle-container">
                <button id="theme-toggle">🌙</button>
            </div>
            <header class="content-header">
                <h1 id="current-view-title">Inbox</h1>
            </header>

            <section class="todo-form-container">
                <form id="todo-form">
                    <input type="text" id="todo-input" placeholder="What needs to be done?" autofocus>
                    <input type="date" id="todo-date"> 
                    <button type="submit">Add Task</button>
                </form>
            </section>

            <section class="todo-display">
                <ul id="todo-list">
                    </ul>
            </section>
        </main>
    </div>
</body>
</html>
